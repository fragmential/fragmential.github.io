name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pdf2svg
          curl -fsSLO https://github.com/jgm/pandoc/releases/download/3.9.0.2/pandoc-3.9.0.2-1-amd64.deb
          sudo dpkg -i pandoc-3.9.0.2-1-amd64.deb

      - name: Generate site
        run: |
          chmod +x ./regen
          ./regen
          rm -rf public
          mkdir -p public/attachments
          cp index.html style.css public/
          cp -R attachments/cropped public/attachments/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
