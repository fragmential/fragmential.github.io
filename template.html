<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
$if(author)$  <meta name="author" content="$for(author)$$author$$sep$, $endfor$" />
$endif$
$if(date)$  <meta name="dcterms.date" content="$date$" />
$endif$
  <title>$pagetitle$</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
$for(header-includes)$
  $header-includes$
$endfor$
$if(math)$
  $math$
$endif$
</head>
<body>

<div class="page-layout">

$if(toc)$
  <nav class="toc-sidebar" aria-label="Table of contents">
    <button class="toc-toggle" aria-expanded="true" aria-controls="toc-list">
      <span class="toc-toggle-text">Contents</span>
      <span class="toc-chevron">▾</span>
    </button>
    <div class="toc-list" id="toc-list">
      $table-of-contents$
    </div>
  </nav>
$endif$

  <article>
    <header id="article-header">
$if(title)$
      <h1 class="article-title">$title$</h1>
$endif$
$if(author)$
      <div class="article-byline">
        <span class="article-author">$for(author)$$author$$sep$, $endfor$</span>
$if(date)$
        <span class="article-date">$date$</span>
$endif$
      </div>
$endif$
    </header>

    $body$

  </article>
</div>

<script>
(function () {
  // --- Citation hover tooltips ---
  document.querySelectorAll('.citation[data-cites]').forEach(function (cite) {
    var keys = cite.getAttribute('data-cites').split(/\s+/);
    var entries = keys.map(function (k) {
      var el = document.getElementById('ref-' + k);
      return el || null;
    }).filter(Boolean);
    if (!entries.length) return;

    var tip = document.createElement('div');
    tip.className = 'citation-tooltip';
    entries.forEach(function (el) {
      var s = document.createElement('div');
      s.innerHTML = el.innerHTML;
      // collapse newlines/whitespace in text nodes
      (function norm(node) {
        node.childNodes.forEach(function(c) {
          if (c.nodeType === 3) c.textContent = c.textContent.replace(/\s+/g, ' ');
          else norm(c);
        });
      })(s);
      tip.appendChild(s);
    });
    document.body.appendChild(tip);

    var hideTimer = null;
    function showTip() {
      clearTimeout(hideTimer);
      tip.style.display = 'block';
      requestAnimationFrame(function () {
        var r = cite.getBoundingClientRect();
        var top = r.top + window.scrollY - tip.offsetHeight - 10;
        var left = r.left + window.scrollX;
        if (left + tip.offsetWidth > window.innerWidth - 16)
          left = window.innerWidth - tip.offsetWidth - 16;
        if (left < 8) left = 8;
        if (top < window.scrollY + 8) top = r.bottom + window.scrollY + 8;
        tip.style.top = top + 'px';
        tip.style.left = left + 'px';
      });
    }
    function hideTip() {
      hideTimer = setTimeout(function () { tip.style.display = 'none'; }, 120);
    }

    cite.addEventListener('mouseenter', showTip);
    cite.addEventListener('mouseleave', hideTip);
    tip.addEventListener('mouseenter', function () { clearTimeout(hideTimer); });
    tip.addEventListener('mouseleave', hideTip);
  });

  // --- Footnotes: hover popup + margin sidenote (LessWrong-style) ---
  var articleEl = document.querySelector('article');
  var sidenoteEntries = []; // { ref, sidenote } for repositioning on resize

  document.querySelectorAll('a.footnote-ref').forEach(function (ref) {
    var href = ref.getAttribute('href');
    if (!href || href.charAt(0) !== '#') return;
    var target = document.getElementById(href.slice(1));
    if (!target) return;

    // Clone the target, strip the back-to-text arrow
    var clone = target.cloneNode(true);
    clone.querySelectorAll('.footnote-back, a[role="doc-backlink"]').forEach(function (el) {
      el.remove();
    });

    // --- Popup tooltip (shown only on narrow viewports, hidden by CSS on wide) ---
    var tip = document.createElement('div');
    tip.className = 'footnote-tooltip';
    tip.innerHTML = clone.innerHTML;
    document.body.appendChild(tip);

    var hideTimer = null;
    function showTip() {
      clearTimeout(hideTimer);
      tip.style.display = 'block';
      requestAnimationFrame(function () {
        var r = ref.getBoundingClientRect();
        var top = r.top + window.scrollY - tip.offsetHeight - 10;
        var left = r.left + window.scrollX;
        if (left + tip.offsetWidth > window.innerWidth - 16)
          left = window.innerWidth - tip.offsetWidth - 16;
        if (left < 8) left = 8;
        if (top < window.scrollY + 8) top = r.bottom + window.scrollY + 8;
        tip.style.top = top + 'px';
        tip.style.left = left + 'px';
      });
    }
    function hideTip() {
      hideTimer = setTimeout(function () { tip.style.display = 'none'; }, 120);
    }

    ref.addEventListener('mouseenter', showTip);
    ref.addEventListener('mouseleave', hideTip);
    ref.addEventListener('focus', showTip);
    ref.addEventListener('blur', hideTip);
    tip.addEventListener('mouseenter', function () { clearTimeout(hideTimer); });
    tip.addEventListener('mouseleave', hideTip);

    // --- Margin sidenote (shown only on wide viewports, via CSS media query) ---
    if (!articleEl) return;
    var sidenote = document.createElement('aside');
    sidenote.className = 'footnote-sidenote';
    var sup = ref.querySelector('sup');
    var numSpan = document.createElement('span');
    numSpan.className = 'footnote-sidenote-number';
    numSpan.textContent = (sup ? sup.textContent : '') + '.';
    sidenote.appendChild(numSpan);
    var contentSpan = document.createElement('span');
    contentSpan.innerHTML = clone.innerHTML;
    sidenote.appendChild(contentSpan);
    articleEl.appendChild(sidenote);

    // Sync hover state between ref and sidenote
    function activate() { ref.classList.add('is-active'); sidenote.classList.add('is-active'); }
    function deactivate() { ref.classList.remove('is-active'); sidenote.classList.remove('is-active'); }
    ref.addEventListener('mouseenter', activate);
    ref.addEventListener('mouseleave', deactivate);
    sidenote.addEventListener('mouseenter', activate);
    sidenote.addEventListener('mouseleave', deactivate);

    sidenoteEntries.push({ ref: ref, sidenote: sidenote });
  });

  function positionSidenotes() {
    if (!articleEl || !sidenoteEntries.length) return;
    var articleTop = articleEl.getBoundingClientRect().top;
    sidenoteEntries.forEach(function (entry) {
      var refTop = entry.ref.getBoundingClientRect().top;
      entry.sidenote.style.top = (refTop - articleTop) + 'px';
    });
  }
  positionSidenotes();
  window.addEventListener('resize', positionSidenotes);
  window.addEventListener('load', positionSidenotes);

  // --- TOC collapse toggle ---
  var tocToggle = document.querySelector('.toc-toggle');
  var tocSidebar = document.querySelector('.toc-sidebar');
  if (tocToggle && tocSidebar) {
    tocToggle.addEventListener('click', function () {
      var collapsed = tocSidebar.classList.toggle('collapsed');
      tocToggle.setAttribute('aria-expanded', String(!collapsed));
    });
  }

  // --- Fade collapsed TOC when overlapping figures ---
  if (tocSidebar) {
    var figures = document.querySelectorAll('figure');
    var chevron = tocSidebar.querySelector('.toc-chevron');
    var checkOverlap = function () {
      if (!tocSidebar.classList.contains('collapsed')) {
        tocSidebar.style.opacity = '';
        return;
      }
      var rect = chevron.getBoundingClientRect();
      var dominated = false;
      figures.forEach(function (fig) {
        var fr = fig.getBoundingClientRect();
        if (rect.bottom > fr.top && rect.top < fr.bottom &&
            rect.right > fr.left && rect.left < fr.right) {
          dominated = true;
        }
      });
      tocSidebar.style.opacity = dominated ? '0' : '';
    };
    window.addEventListener('scroll', checkOverlap, { passive: true });
    tocToggle.addEventListener('click', function () {
      requestAnimationFrame(checkOverlap);
    });
  }

  // --- TOC active-section tracking on scroll ---
  var tocLinks = Array.from(document.querySelectorAll('.toc-sidebar a[href^="#"]'));
  var tocHeadings = tocLinks.map(function (a) {
    var id = decodeURIComponent(a.hash.slice(1));
    var heading = document.getElementById(id);
    return heading ? { id: id, link: a, heading: heading } : null;
  }).filter(Boolean);

  if (tocHeadings.length) {
    function updateToc() {
      var active = tocHeadings[0];
      var marker = Math.min(window.innerHeight * 0.35, 180);

      tocHeadings.forEach(function (entry) {
        if (entry.heading.getBoundingClientRect().top <= marker) {
          active = entry;
        }
      });

      // At the very bottom, make sure the final section is selected even if
      // the last heading never reaches the marker line.
      if (window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 2) {
        active = tocHeadings[tocHeadings.length - 1];
      }

      tocLinks.forEach(function (a) {
        a.classList.toggle('active', a === active.link);
      });
    }

    window.addEventListener('scroll', updateToc, { passive: true });
    window.addEventListener('resize', updateToc);
    updateToc();
  }
})();
</script>

</body>
</html>
